<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Shack - VA7ECX</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="/style/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
</head>
<script src="/script/jQuery.js"></script>
<script>
    $.get("/frame/sidebar-left.html", function (data) {
        $(".sidebar-left").replaceWith(data);
    });
    $.get("/frame/sidebar-right.html", function (data) {
        $(".sidebar-right").replaceWith(data);
    });
    $.get("/frame/footer.html", function (data) {
        $(".footer").replaceWith(data);
    });
</script>

<body>
    <div class="container">
        <header></header>
        <aside id="sidebar-left">
            <div class="sidebar-left"></div>
        </aside>
        <main>

            <article>
                <h1>Web Shack</h1>
                <h2>This virtual space is best viewed on a VR headset, but desktop works too.</h2>

            </article>
            <hr style="height: 4px; background-color: #333; border: none; margin: 40px 0; border-radius: 10px;">
            <article>
                <div class="space-container">
                    <a-scene embedded>
                        <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
                        <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
                        <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
                        <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
                        <a-sky color="#ECECEC"></a-sky>
                    </a-scene>
                </div>
            </article>


        </main>
        <aside id="sidebar-right">
            <div class="sidebar-right"></div>
        </aside>

    </div>
    <footer>
        <div class="footer"></div>
    </footer>
</body>

</html>
