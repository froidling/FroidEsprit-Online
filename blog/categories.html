<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome to my Website - VA7ECX</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="/style/posts.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>
<script src="/script/jQuery.js"></script>

<script>
    $.get("/frame/sidebar-left.html", function (data) {
        $(".sidebar-left").replaceWith(data);
    });
    $.get("/frame/post-sidebar.html", function (data) {
        $(".sidebar-right").replaceWith(data);
    });
    $.get("/frame/footer.html", function (data) {
        $(".footer").replaceWith(data);
    });
</script>

<body>
    <div class="container">
        <aside id="sidebar-left">
            <div class="sidebar-left"></div>
        </aside>
        <!-- Main content for the blog post -->
        <main>
            <div>
                <article>
                    <h1 id="page-title">All Categories</h1>
                    <p class="meta">A list of all posts by category.</p>

                    <div id="filter-reset" style="display: none; margin-bottom: 1.5rem;">
                        <a href="/blog/categories.html">&larr; View all categories</a>
                    </div>

                    <div id="category-posts-container">
                        <p>Loading categories...</p>
                    </div>

                    <script src="/script/categoryPage.js" defer></script>
                </article>
            </div>
        </main>
        <aside id="sidebar-right">
            <div class="sidebar-right"></div>
        </aside>

    </div>

    <footer>
        <div class="footer"></div>
    </footer>

</body>

</html>
